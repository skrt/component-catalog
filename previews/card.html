<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="flex flex-col gap-8">

    <!-- CARD (Default) -->
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-0">CARD (Default)</h3>
    <div class="w-[448px] flex flex-col gap-2 bg-gray-50 rounded-lg p-6">
      <p class="text-base font-bold text-gray-900 leading-6">カードタイトル</p>
      <p class="text-sm font-normal text-gray-600 leading-5">コンテンツをここに配置</p>
    </div>

    <!-- CARD (With Description) -->
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-0">CARD (With Description)</h3>
    <div class="w-[448px] flex flex-col gap-2 bg-gray-50 rounded-lg p-6">
      <div class="flex flex-col gap-1">
        <p class="text-base font-bold text-gray-900 leading-6">カードタイトル</p>
        <p class="text-xs font-normal text-gray-600 leading-4">補足テキスト</p>
      </div>
      <p class="text-sm font-normal text-gray-600 leading-5">コンテンツをここに配置</p>
    </div>

    <!-- CARD (With Rich Content) -->
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-0">CARD (With Rich Content)</h3>
    <div class="w-[448px] flex flex-col gap-2 bg-gray-50 rounded-lg p-6">
      <p class="text-base font-bold text-gray-900 leading-6">サポートアクセス設定</p>
      <div class="flex flex-col gap-3">
        <p class="text-sm font-normal text-gray-600 leading-5">shizaiメンバーがこのワークスペースにサポートアクセスすることを許可します</p>
        <div class="flex items-center justify-between">
          <span class="text-sm font-normal text-gray-900">アクセスを許可</span>
          <div class="w-9 h-5 bg-blue-500 rounded-full p-0.5 flex items-center justify-end">
            <div class="w-4 h-4 bg-white rounded-full shadow-sm"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
