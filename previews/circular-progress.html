<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>
  #back-link { display: inline-flex; } .in-iframe #back-link { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .circular-progress {
    border-radius: 50%;
    border-style: solid;
    border-color: #e5e7eb;
    border-top-color: #615fff;
    animation: spin 0.8s linear infinite;
  }
</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- SIZE VARIANTS -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">SIZE VARIANTS</h3>
    <div class="flex flex-wrap items-center gap-6">

      <!-- xs: 12px, border-width 1.5px -->
      <div class="flex flex-col items-center gap-2">
        <span class="text-[10px] font-semibold text-gray-400 uppercase">xs (12px)</span>
        <div class="circular-progress w-3 h-3" style="border-width:1.5px;"></div>
      </div>

      <!-- sm: 14px, border-width 2px -->
      <div class="flex flex-col items-center gap-2">
        <span class="text-[10px] font-semibold text-gray-400 uppercase">sm (14px)</span>
        <div class="circular-progress w-3.5 h-3.5" style="border-width:2px;"></div>
      </div>

      <!-- md: 16px, border-width 2px -->
      <div class="flex flex-col items-center gap-2">
        <span class="text-[10px] font-semibold text-gray-400 uppercase">md (16px)</span>
        <div class="circular-progress w-4 h-4" style="border-width:2px;"></div>
      </div>

      <!-- lg: 20px, border-width 2.5px -->
      <div class="flex flex-col items-center gap-2">
        <span class="text-[10px] font-semibold text-gray-400 uppercase">lg (20px)</span>
        <div class="circular-progress w-5 h-5" style="border-width:2.5px;"></div>
      </div>

    </div>
  </section>

  <!-- USAGE: Button loading state -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">USAGE — BUTTON LOADING</h3>
    <div class="flex flex-wrap items-center gap-4">
      <!-- xs button loading -->
      <button class="inline-flex items-center justify-center gap-1 px-2 py-1 text-xs font-semibold text-white rounded-md bg-[#615fff]" disabled>
        <div class="circular-progress w-3 h-3" style="border-width:1.5px;border-color:rgba(255,255,255,0.3);border-top-color:white;"></div>
      </button>
      <!-- sm button loading -->
      <button class="inline-flex items-center justify-center gap-1.5 px-3 py-1.5 text-sm font-semibold text-white rounded-md bg-[#615fff]" disabled>
        <div class="circular-progress w-3.5 h-3.5" style="border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white;"></div>
      </button>
      <!-- md button loading -->
      <button class="inline-flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-semibold text-white rounded-md bg-[#615fff]" disabled>
        <div class="circular-progress w-4 h-4" style="border-width:2px;border-color:rgba(255,255,255,0.3);border-top-color:white;"></div>
      </button>
      <!-- lg button loading -->
      <button class="inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-[#615fff]" disabled>
        <div class="circular-progress w-5 h-5" style="border-width:2.5px;border-color:rgba(255,255,255,0.3);border-top-color:white;"></div>
      </button>
    </div>
  </section>

</body>
</html>
