<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            btn: {
              primary: { default: '#615fff', hover: '#4f39f6', active: '#432dd7' },
              secondary: { default: '#e0e7ff', hover: '#c6d2ff', active: '#a3b3ff' },
            },
            'btn-text': {
              secondary: { default: '#432dd7', hover: '#193cb8', active: '#1c398e' },
            }
          }
        }
      }
    }
  </script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-8">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <div class="space-y-10">

    <!-- DEFAULT -->
    <section>
      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Default</h3>
      <div class="bg-white border-t border-gray-200 flex items-center justify-end px-10 py-3">
        <!-- 左ボタン（secondary） -->
        <button class="w-[160px] inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold rounded-md bg-indigo-100 text-indigo-700 hover:bg-indigo-200 active:bg-indigo-300 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.659 22H18a2 2 0 0 0 2-2V8a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 14 2H6a2 2 0 0 0-2 2v9.34"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10.378 12.622a1 1 0 0 1 3 3.003L8.36 20.637a2 2 0 0 1-.854.506l-2.867.837a.5.5 0 0 1-.62-.62l.836-2.869a2 2 0 0 1 .506-.853z"/></svg>
          下書き保存
        </button>
        <!-- 右エリア -->
        <div class="flex-1 flex justify-end">
          <button class="w-[320px] inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary-default hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
            確認画面へ進む
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </section>

    <!-- TWO RIGHT BUTTONS -->
    <section>
      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Two Right Buttons</h3>
      <div class="bg-white border-t border-gray-200 flex items-center justify-end px-10 py-3">
        <!-- 左ボタン（secondary） -->
        <button class="w-[160px] inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold rounded-md bg-indigo-100 text-indigo-700 hover:bg-indigo-200 active:bg-indigo-300 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.659 22H18a2 2 0 0 0 2-2V8a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 14 2H6a2 2 0 0 0-2 2v9.34"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M10.378 12.622a1 1 0 0 1 3 3.003L8.36 20.637a2 2 0 0 1-.854.506l-2.867.837a.5.5 0 0 1-.62-.62l.836-2.869a2 2 0 0 1 .506-.853z"/></svg>
          下書き保存
        </button>
        <!-- 右エリア（ボタン2つ） -->
        <div class="flex-1 flex justify-end gap-2">
          <button class="w-[320px] inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary-default hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            確認画面へ進む
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="w-[320px] inline-flex items-center justify-center gap-2 px-6 py-3 text-base font-semibold text-white rounded-md bg-btn-primary-default hover:bg-btn-primary-hover active:bg-btn-primary-active transition-colors">
            確認画面へ進む
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </section>

  </div>
</body>
</html>
