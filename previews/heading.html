<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">TYPE = PAGE</h3>
    <div class="space-y-4">
      <div>
        <h1 class="text-2xl font-bold text-[#171923]">タイトル</h1>
        <p class="text-sm text-[#4A5568] mt-2">補足テキスト</p>
      </div>
    </div>
  </section>

  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">TYPE = SECTION</h3>
    <div class="space-y-4">
      <div>
        <h2 class="text-xl font-bold text-[#171923]">タイトル</h2>
        <p class="text-sm text-[#4A5568] mt-1">補足テキスト</p>
      </div>
    </div>
  </section>

  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">TYPE = SUB</h3>
    <div class="space-y-4">
      <div>
        <h3 class="text-base font-bold text-[#171923]">タイトル</h3>
        <p class="text-sm text-[#4A5568] mt-1">補足テキスト</p>
      </div>
    </div>
  </section>
  <!-- ボタンエリア: 発注書詳細（発注取り消し・複製・メール） -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">BUTTON AREA (PO DETAIL)</h3>
    <div class="flex items-center justify-between">
      <!-- 戻るボタン -->
      <button class="w-10 h-10 inline-flex items-center justify-center rounded-md border border-gray-200 bg-white hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4 text-gray-900" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      </button>
      <!-- アクションボタン -->
      <div class="flex items-center gap-2">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-900 bg-white border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/></svg>
          発注取り消し
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-900 bg-white border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          複製
        </button>
        <button class="relative w-10 h-10 inline-flex items-center justify-center rounded-md border border-gray-200 bg-white hover:bg-gray-50 transition-colors">
          <span class="absolute -top-[3px] left-[33px] w-2 h-2 bg-red-500 rounded-full"></span>
          <svg class="w-4 h-4 text-gray-900" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ボタンエリア: 削除・複製 -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">BUTTON AREA (DELETE + COPY)</h3>
    <div class="flex items-center justify-between">
      <!-- 戻るボタン -->
      <button class="w-10 h-10 inline-flex items-center justify-center rounded-md border border-gray-200 bg-white hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4 text-gray-900" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      </button>
      <!-- アクションボタン -->
      <div class="flex items-center gap-2">
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-900 bg-white border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          削除
        </button>
        <button class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-900 bg-white border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
          複製
        </button>
      </div>
    </div>
  </section>
</body>
</html>
