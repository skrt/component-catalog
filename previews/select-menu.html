<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- DEFAULT (with selected item) -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Default</h3>
    <div class="w-[320px] max-h-[240px] overflow-y-auto bg-white border border-gray-200 rounded-md shadow-[0px_4px_16px_-2px_rgba(0,0,0,0.08)]">
      <!-- Selected option -->
      <div class="flex items-center w-full">
        <div class="flex items-center justify-center pl-3 py-2.5 w-9 shrink-0">
          <svg class="w-4 h-4 text-gray-900" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <div class="flex-1 p-3">
          <span class="text-sm font-normal text-gray-900 whitespace-nowrap">丸山印刷株式会社</span>
        </div>
      </div>
      <!-- Unselected options -->
      <div class="flex items-center w-full">
        <div class="w-9 h-11 shrink-0"></div>
        <div class="flex-1 p-3">
          <span class="text-sm font-normal text-gray-900 whitespace-nowrap">株式会社サプライヤー</span>
        </div>
      </div>
      <div class="flex items-center w-full">
        <div class="w-9 h-11 shrink-0"></div>
        <div class="flex-1 p-3">
          <span class="text-sm font-normal text-gray-900 whitespace-nowrap">K.K株式会社</span>
        </div>
      </div>
      <div class="flex items-center w-full">
        <div class="w-9 h-11 shrink-0"></div>
        <div class="flex-1 p-3">
          <span class="text-sm font-normal text-gray-900 whitespace-nowrap">東京パッケージ工業</span>
        </div>
      </div>
      <div class="flex items-center w-full">
        <div class="w-9 h-11 shrink-0"></div>
        <div class="flex-1 p-3">
          <span class="text-sm font-normal text-gray-900 whitespace-nowrap">にいやま株式会社</span>
        </div>
      </div>
      <div class="flex items-center w-full">
        <div class="w-9 h-11 shrink-0"></div>
        <div class="flex-1 p-3">
          <span class="text-sm font-normal text-gray-900 whitespace-nowrap">株式会社グリーンプリント</span>
        </div>
      </div>
    </div>
  </section>

  <!-- EMPTY -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Empty</h3>
    <div class="w-[320px] bg-white border border-gray-200 rounded-md shadow-[0px_4px_16px_-2px_rgba(0,0,0,0.08)]">
      <div class="px-3 py-2">
        <span class="text-sm font-normal text-gray-400 whitespace-nowrap">該当する選択肢がありません</span>
      </div>
    </div>
  </section>

</body>
</html>
