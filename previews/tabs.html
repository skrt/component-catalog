<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
<style>#back-link { display: inline-flex; } .in-iframe #back-link { display: none; }</style>
<script>if (window !== window.top) { document.documentElement.classList.add("in-iframe"); document.addEventListener("DOMContentLoaded", function() { var el = document.getElementById("back-link"); if (el) el.remove(); }); }</script>
</head>
<body class="bg-white p-6 space-y-10">
  <a href="../" class="inline-flex items-center gap-1 text-sm text-gray-400 hover:text-gray-600 mb-4" id="back-link">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    一覧に戻る
  </a>

  <!-- UNDERLINE TABS -->
  <!-- Active: text=blue-500(#2B7FFF), border-b-2=blue-500, font-semibold -->
  <!-- Hover: text=blue-600(#155DFC), no underline, font-semibold -->
  <!-- Inactive: text=gray-600(#4A5565), no underline, font-normal -->
  <!-- Padding: p-3 (12px all sides) -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Underline Tabs</h3>
    <div class="border-b border-slate-200">
      <nav class="flex">
        <!-- Active -->
        <button class="text-sm font-semibold p-3 border-b-2 border-blue-500 text-blue-500">
          タブ1
        </button>
        <!-- Inactive -->
        <button class="text-sm font-normal p-3 border-b-2 border-transparent text-gray-600 hover:text-blue-600 hover:font-semibold transition-colors">
          タブ2
        </button>
        <!-- Inactive -->
        <button class="text-sm font-normal p-3 border-b-2 border-transparent text-gray-600 hover:text-blue-600 hover:font-semibold transition-colors">
          タブ3
        </button>
        <!-- Inactive -->
        <button class="text-sm font-normal p-3 border-b-2 border-transparent text-gray-600 hover:text-blue-600 hover:font-semibold transition-colors">
          タブ4
        </button>
      </nav>
    </div>
  </section>

  <!-- UNDERLINE TABS - STATES -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Underline Tab States</h3>
    <div class="flex items-end gap-6">
      <!-- Active -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400 uppercase">active</span>
        <div class="border-b border-slate-200">
          <button class="text-sm font-semibold p-3 border-b-2 border-blue-500 text-blue-500">Tab</button>
        </div>
      </div>
      <!-- Inactive -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400 uppercase">inactive</span>
        <div class="border-b border-slate-200">
          <button class="text-sm font-normal p-3 border-b-2 border-transparent text-gray-600">Tab</button>
        </div>
      </div>
      <!-- Hover -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400 uppercase">hover</span>
        <div class="border-b border-slate-200">
          <button class="text-sm font-semibold p-3 border-b-2 border-transparent text-blue-600">Tab</button>
        </div>
      </div>
    </div>
  </section>

  <!-- PILL TABS -->
  <!-- Active: bg=blue-100(#DBEAFE), text=blue-700(#1447E6), font-semibold, rounded-md(6px), py-1.5, counter bg=blue-100 rounded-sm -->
  <!-- Hover: bg=gray-100(#F3F4F6), text=gray-600(#4A5565), font-normal, rounded-md(6px), counter bg=gray-100 rounded-full -->
  <!-- Inactive: bg=white, text=gray-600(#4A5565), font-normal, rounded-md(6px), counter bg=red-50 text=red-500 rounded-full -->
  <!-- Inactive without counter: py-1.5, with counter: py-1 -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Pill Tabs</h3>
    <div class="flex gap-1">
      <!-- Active (no counter: すべて/下書き/納品済み/取り消し) -->
      <button class="flex items-center gap-1 text-sm font-semibold px-2 py-1.5 rounded-md bg-blue-100 text-blue-700">
        すべて
      </button>
      <!-- Inactive without counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        下書き
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        承認待ち
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        送信待ち
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        納品待ち
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        会話中
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive without counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        納品済み
      </button>
      <!-- Inactive with counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        差し戻し
        <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
      </button>
      <!-- Inactive without counter -->
      <button class="flex items-center gap-1 text-sm font-normal px-2 py-1.5 rounded-md bg-white text-gray-600 hover:bg-gray-100 transition-colors">
        取り消し
      </button>
    </div>
  </section>

  <!-- PILL TAB STATES -->
  <section>
    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Pill Tab States</h3>
    <div class="flex items-end gap-6">
      <!-- Active -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400 uppercase">active</span>
        <button class="flex items-center gap-1 text-sm font-semibold px-2 py-1 rounded-md bg-blue-100 text-blue-700">
          Tab
          <span class="text-sm font-normal px-2 py-0.5 rounded-sm bg-blue-100 text-blue-700">999</span>
        </button>
      </div>
      <!-- Inactive -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400 uppercase">inactive</span>
        <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-white text-gray-600">
          Tab
          <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
        </button>
      </div>
      <!-- Hover -->
      <div class="flex flex-col items-start gap-1">
        <span class="text-[10px] text-gray-400 uppercase">hover</span>
        <button class="flex items-center gap-1 text-sm font-normal px-2 py-1 rounded-md bg-gray-100 text-gray-600">
          Tab
          <span class="text-sm font-normal px-2 py-0.5 rounded-full bg-red-50 text-red-500">999</span>
        </button>
      </div>
    </div>
  </section>

</body>
</html>
